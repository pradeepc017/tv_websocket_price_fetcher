name: Build Optimized Binary

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod tidy

      # ✅ Run tests
      - name: Run tests
        run: go test ./...

      # ✅ Build optimized binary (Linux)
      - name: Build optimized binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-s -w" -o tvfeed

      # ✅ Optional: compress with UPX (reduces size further)
      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx

      - name: Compress binary
        run: upx --best --lzma tvfeed

      # ✅ Show file info
      - name: Binary info
        run: |
          ls -lh tvfeed
          file tvfeed

      # ✅ Upload artifact
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tvfeed-linux-amd64
          path: tvfeed
